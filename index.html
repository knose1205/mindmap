<meta name="theme-color" content="#2A332F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<style>
  :root {
    --ink-dark: #2A332F;
    --ink-mid: #5B6560;
    --ink-faint: #9BA39D;
    --line-color: #B9C2C6;
    --board-bg: #FFFFFF;
    --tabbar-bg: #F0F2F1;
    --tab-inactive-text: #7A847E;
    --accent: #E0A458;

    --node-root-fill: #2A332F;
    --node-root-text: #FFFFFF;
    --node-blue-fill: #3B7DD8;
    --node-amber-fill: #D98E2B;
    --node-pink-fill: #C2477E;
    --node-green-fill: #3F9160;
    --node-purple-fill: #7C56C7;
    --node-text-light: #FFFFFF;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    height: 100%;
    font-family: ui-rounded, "Segoe UI Rounded", "Trebuchet MS", "Hiragino Maru Gothic ProN", sans-serif;
    background: var(--tabbar-bg);
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    width: 100vw;
    padding-top: env(safe-area-inset-top);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* --- タブバー --- */
  #tabbar {
    flex: 0 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 4px;
    padding: 10px 10px 0;
    background: var(--tabbar-bg);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x;
    border-bottom: 1px solid #E1E4E2;
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 10px 10px 16px;
    border-radius: 10px 10px 0 0;
    background: transparent;
    color: var(--tab-inactive-text);
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    max-width: 55vw;
    touch-action: manipulation;
  }
  .tab.active {
    background: var(--board-bg);
    color: var(--ink-dark);
    box-shadow: 0 -1px 0 rgba(0,0,0,0.04) inset;

  /* --- ボード --- */

  .btn {

  @media (max-width: 480px) {

  /* --- 同期モーダル --- */

</style>
</head>
<body>

<div id="app">
  <div id="tabbar"></div>

  <div id="board">
    <div id="hint">2本指でパン/ピンチでズーム　ノードをタップで選択　✎で編集</div>
    <div id="saveStatus"></div>
    <div id="toolbar">
      <button class="btn" id="syncBtn">🔗 同期</button>
      <button class="btn" id="saveBtn">💾 保存</button>
      <button class="btn" id="addBtn">＋ 追加</button>
      <button class="btn" id="delBtn">－ 削除</button>
      <button class="btn" id="exportBtn">⬇ CSV</button>
    </div>

    <div id="syncModalBackdrop">
      <div id="syncModal">
        <button id="syncModalClose" title="閉じる">×</button>
        <h2>複数端末で同期</h2>
        <p id="syncStatusLine">現在はこの端末だけに保存されています(匿名)。</p>

        <label class="sync-label">メールアドレス</label>
        <input id="syncEmailInput" type="email" placeholder="you@example.com" autocomplete="email" />

        <button class="btn sync-action" id="linkEmailBtn">① このデータをメールに登録する</button>
        <p class="sync-help">はじめて同期する端末で押してください。確認メールが届きます。</p>

        <button class="btn sync-action" id="loginEmailBtn">② このメールのデータを読み込む</button>
        <p class="sync-help">別の端末で①をすでに行った場合、ここにそのメールアドレスを入れて押すと、ログイン用のリンクが届きます。</p>

        <p id="syncMessage"></p>
      </div>
    </div>

    <div id="canvas">
      <div id="world">
        <svg id="edges" width="1" height="1"></svg>
        <div id="nodesLayer"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function () {
  const NODE_COLORS = [
    { fill: "var(--node-root-fill)", text: "var(--node-root-text)" },
    { fill: "var(--node-blue-fill)", text: "var(--node-text-light)" },
    { fill: "var(--node-amber-fill)", text: "var(--node-text-light)" },
    { fill: "var(--node-pink-fill)", text: "var(--node-text-light)" },
    { fill: "var(--node-green-fill)", text: "var(--node-text-light)" },
    { fill: "var(--node-purple-fill)", text: "var(--node-text-light)" },
  ];
  const ROOT_ID = "root";
  const STORAGE_KEY = "mindmap-app-state";

  // --- Supabase設定 ---
  const SUPABASE_URL = "https://fajaswwvveaqbdbmjkft.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_lPwbE51CCQpJrFTHgWK46A_9EqgHzgx";
  const supabaseConfigured = !!(SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase);

  let sbClient = null;
  let sbUserId = null;
  let sbUserEmail = null;
  let sbIsAnonymous = true;

  async function initSupabase() {
    if (!supabaseConfigured) return false;
    try {
      sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      let { data: { session } } = await sbClient.auth.getSession();
      if (!session) {
        const { data, error } = await sbClient.auth.signInAnonymously();
        if (error) throw error;
        session = data.session;
      }
      applySession(session);

      // メールリンクのクリックによるログイン/紐付け確定など、認証状態が変わったら反映する
      sbClient.auth.onAuthStateChange((event, newSession) => {
        if (!newSession) return;
        const prevUserId = sbUserId;
        applySession(newSession);
        updateSyncUI();
        if (prevUserId && prevUserId !== newSession.user.id) {
          // 別アカウント(メールでログインしたアカウント)に切り替わった → データを読み直す
          (async () => {
            await loadSaved();
            renderAll();
          })();
        }
      });

      return true;
    } catch (err) {
      console.error("Supabase初期化に失敗:", err);
      sbClient = null;
      sbUserId = null;
      return false;
    }
  }

  function applySession(session) {
    sbUserId = session.user.id;
    sbUserEmail = session.user.email || null;
    sbIsAnonymous = session.user.is_anonymous !== false && !sbUserEmail;
  }

  // 保存先の優先順位: Supabase(複数端末で同期) > Claude.aiのプレビュー内ストレージ > このブラウザのlocalStorage
  const hasClaudeStorage = typeof window.storage !== "undefined" && window.storage
    && typeof window.storage.get === "function";

  async function storageGet(key) {
    if (sbClient && sbUserId) {
      const { data, error } = await sbClient
        .from("app_state")
        .select("data")
        .eq("user_id", sbUserId)
        .maybeSingle();
      if (error) throw error;
      return data ? data.data : null;
    }
    if (hasClaudeStorage) {
      const result = await window.storage.get(key, false);
      return result && result.value ? JSON.parse(result.value) : null;
    }
    const raw = localStorage.getItem(key);
    return raw == null ? null : JSON.parse(raw);
  }

  async function storageSet(key, valueObj) {
    if (sbClient && sbUserId) {
      const { error } = await sbClient.from("app_state").upsert({
        user_id: sbUserId,
        data: valueObj,
        updated_at: new Date().toISOString(),
      });
      if (error) throw error;
      return;
    }
    if (hasClaudeStorage) {
      await window.storage.set(key, JSON.stringify(valueObj), false);
      return;
    }
    localStorage.setItem(key, JSON.stringify(valueObj));
  }
  const uid = () => Math.random().toString(36).slice(2, 10);

  function makeTheme(name) {
    return {
      id: uid(),
      name,
      nodes: {
        [ROOT_ID]: { id: ROOT_ID, text: name, x: 0, y: 0, parentId: null, depth: 0 },
      },
      selectedId: ROOT_ID,
      editingId: null,
      colorMenuFor: null,
      pan: { x: 0, y: 0 },
      zoom: 1,
    };
  }

  // --- テーマ(タブ)群 ---
  let themes = [makeTheme("テーマ1")];
  let activeThemeId = themes[0].id;
  let editingTabId = null;
  let ready = false;

  // ドラッグ/ジェスチャー状態
  let nodeDrag = null;            // { id, pointerId, startX, startY, origX, origY }
  const canvasPointers = new Map(); // pointerId -> {x,y} (パン/ピンチ用)
  let pinchState = null;          // { initialDist, initialZoom, initialMid, initialPan }
  let panState = null;            // { startX, startY, origX, origY }

  const tabbar = document.getElementById("tabbar");
  const world = document.getElementById("world");
  const canvas = document.getElementById("canvas");
  const edgesSvg = document.getElementById("edges");
  const nodesLayer = document.getElementById("nodesLayer");
  const addBtn = document.getElementById("addBtn");
  const delBtn = document.getElementById("delBtn");
  const exportBtn = document.getElementById("exportBtn");
  const saveBtn = document.getElementById("saveBtn");
  const saveStatus = document.getElementById("saveStatus");
  const syncBtn = document.getElementById("syncBtn");
  const syncModalBackdrop = document.getElementById("syncModalBackdrop");
  const syncModalClose = document.getElementById("syncModalClose");
  const syncStatusLine = document.getElementById("syncStatusLine");
  const syncEmailInput = document.getElementById("syncEmailInput");
  const linkEmailBtn = document.getElementById("linkEmailBtn");
  const loginEmailBtn = document.getElementById("loginEmailBtn");
  const syncMessage = document.getElementById("syncMessage");

  function current() {
    return themes.find((t) => t.id === activeThemeId);
  }

  function colorFor(node) {
    const idx = node.colorIndex != null ? node.colorIndex : node.depth % NODE_COLORS.length;
    return NODE_COLORS[idx];
  }

  // --- 保存(手動ボタン) ---
  let dirty = false;

  function markDirty() {
    if (!ready) return;
    dirty = true;
    saveStatus.textContent = "未保存の変更があります";
    saveStatus.style.opacity = "1";
    saveBtn.classList.add("needs-save");
  }

  async function doSave() {
    saveStatus.textContent = "保存中…";
    saveStatus.style.opacity = "1";
    try {
      const payload = {
        activeThemeId,
        themes: themes.map((t) => ({
          id: t.id,
          name: t.name,
          nodes: t.nodes,
          pan: t.pan,
          zoom: t.zoom,
          selectedId: t.selectedId,
        })),
      };
      await storageSet(STORAGE_KEY, payload);
      dirty = false;
      saveBtn.classList.remove("needs-save");
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      saveStatus.textContent = `保存しました(${hh}:${mm})`;
      setTimeout(() => {
        if (!dirty) saveStatus.style.opacity = "0";
      }, 2000);
    } catch (err) {
      saveStatus.textContent = "保存に失敗しました。もう一度お試しください";
      console.error("save error", err);
    }
  }

  async function loadSaved() {
    try {
      const data = await storageGet(STORAGE_KEY);
      if (data && Array.isArray(data.themes) && data.themes.length > 0) {
        themes = data.themes.map((t) => ({
          id: t.id || uid(),
          name: t.name || "テーマ",
          nodes: t.nodes || { [ROOT_ID]: { id: ROOT_ID, text: "テーマ", x: 0, y: 0, parentId: null, depth: 0 } },
          selectedId: t.selectedId || ROOT_ID,
          editingId: null,
          colorMenuFor: null,
          pan: t.pan || { x: 0, y: 0 },
          zoom: t.zoom || 1,
        }));
        activeThemeId = data.activeThemeId && themes.some((t) => t.id === data.activeThemeId)
          ? data.activeThemeId
          : themes[0].id;
      }
    } catch (err) {
      // 保存データが無い場合はデフォルトのまま
      console.error("load error", err);
    }
  }


  // --- ノード操作 ---
  function addChild(parentId) {
    const t = current();
    const parent = t.nodes[parentId];
    if (!parent) return;
    const siblingCount = Object.values(t.nodes).filter((n) => n.parentId === parentId).length;
    const angle = -0.6 + siblingCount * 0.5;
    const dist = 190;
    const id = uid();
    t.nodes[id] = {
      id,
      text: "新しいアイデア",
      x: parent.x + Math.cos(angle) * dist + (parentId === ROOT_ID ? 0 : 40),
      y: parent.y + Math.sin(angle) * dist + 60,
      parentId,
      depth: (parent.depth || 0) + 1,
    };
    t.selectedId = id;
    t.editingId = id;
    renderBoard();
    markDirty();
  }

  function addSibling(id) {
    const t = current();
    const node = t.nodes[id];
    if (!node || !node.parentId) {
      addChild(id);
      return;
    }
    addChild(node.parentId);
  }

  function deleteNode(id) {
    const t = current();
    if (id === ROOT_ID) return;
    const toDelete = new Set();
    (function collect(nid) {
      toDelete.add(nid);
      Object.values(t.nodes).forEach((n) => {
        if (n.parentId === nid) collect(n.id);
      });
    })(id);
    toDelete.forEach((nid) => delete t.nodes[nid]);
    if (t.selectedId === id || toDelete.has(t.selectedId)) t.selectedId = ROOT_ID;
    renderBoard();
    markDirty();
  }

  function updateText(id, text) {
    current().nodes[id].text = text;
  }

  function updateColor(id, idx) {
    current().nodes[id].colorIndex = idx;
    current().colorMenuFor = null;
    renderBoard();
    markDirty();
  }

  function pathFor(from, to) {
    const mx = (from.x + to.x) / 2;
    return `M ${from.x} ${from.y} C ${mx} ${from.y}, ${mx} ${to.y}, ${to.x} ${to.y}`;
  }

  // --- CSVエクスポート ---
  function csvField(value) {
    const str = String(value == null ? "" : value);
    return '"' + str.replace(/"/g, '""') + '"';
  }

  function breadcrumbFor(nodes, node) {
    const parts = [];
    let cur = node;
    while (cur) {
      parts.unshift(cur.text);
      cur = cur.parentId ? nodes[cur.parentId] : null;
    }
    return parts.join(" > ");
  }

  function exportCSV() {
    const header = ["テーマ", "ノードID", "親ノードID", "深さ", "内容", "階層パス"];
    const rows = [header];

    themes.forEach((t) => {
      const list = Object.values(t.nodes).sort((a, b) => a.depth - b.depth);
      list.forEach((node) => {
        rows.push([
          t.name,
          node.id,
          node.parentId || "",
          node.depth,
          node.text,
          breadcrumbFor(t.nodes, node),
        ]);
      });
    });

    const csvBody = rows.map((row) => row.map(csvField).join(",")).join("\r\n");
    const csvContent = "\uFEFF" + csvBody; // Excelで文字化けしないようBOMを付与

    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `mindmap_${stamp}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // --- タブバー描画 ---
  function renderTabs() {
    tabbar.innerHTML = "";
    themes.forEach((t) => {
      const tab = document.createElement("div");
      tab.className = "tab" + (t.id === activeThemeId ? " active" : "");
      tab.addEventListener("click", () => {
        if (editingTabId === t.id) return;
        activeThemeId = t.id;
        renderAll();
      });

      if (editingTabId === t.id) {
        const input = document.createElement("input");
        input.value = t.name;
        input.addEventListener("click", (e) => e.stopPropagation());
        input.addEventListener("input", (e) => {
          t.name = e.target.value;
        });
        input.addEventListener("blur", () => {
          if (!t.name.trim()) t.name = "無題のテーマ";
          editingTabId = null;
          renderAll();
          markDirty();
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === "Escape") {
            e.preventDefault();
            input.blur();
          }
        });
        tab.appendChild(input);
        setTimeout(() => { input.focus(); input.select(); }, 0);
      } else {
        const nameSpan = document.createElement("span");
        nameSpan.className = "tab-name";
        nameSpan.textContent = t.name;
        tab.appendChild(nameSpan);

        const editBtn = document.createElement("button");
        editBtn.className = "tab-edit";
        editBtn.textContent = "✎";
        editBtn.title = "テーマ名を編集";
        editBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          editingTabId = t.id;
          renderTabs();
        });
        tab.appendChild(editBtn);
      }

      if (themes.length > 1) {
        const close = document.createElement("button");
        close.className = "tab-close";
        close.textContent = "×";
        close.title = "このテーマを削除";
        close.addEventListener("click", (e) => {
          e.stopPropagation();
          const idx = themes.findIndex((x) => x.id === t.id);
          themes = themes.filter((x) => x.id !== t.id);
          if (activeThemeId === t.id) {
            activeThemeId = themes[Math.max(0, idx - 1)].id;
          }
          renderAll();
          markDirty();
        });
        tab.appendChild(close);
      }

      tabbar.appendChild(tab);
    });

    const newTabBtn = document.createElement("button");
    newTabBtn.id = "newTabBtn";
    newTabBtn.textContent = "+";
    newTabBtn.title = "新しいテーマを追加";
    newTabBtn.addEventListener("click", () => {
      const t = makeTheme("テーマ" + (themes.length + 1));
      themes.push(t);
      activeThemeId = t.id;
      editingTabId = t.id;
      renderAll();
      markDirty();
    });
    tabbar.appendChild(newTabBtn);
  }

  // --- ボード描画 ---
  function renderBoard() {
    const t = current();
    world.style.transform = `translate(${t.pan.x}px, ${t.pan.y}px) scale(${t.zoom})`;

    edgesSvg.innerHTML = "";
    Object.values(t.nodes).forEach((n) => {
      if (!n.parentId) return;
      const from = t.nodes[n.parentId];
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", pathFor(from, n));
      path.setAttribute("class", "edge");
      edgesSvg.appendChild(path);
    });

    nodesLayer.innerHTML = "";
    Object.values(t.nodes).forEach((node) => {
      const c = colorFor(node);
      const el = document.createElement("div");
      el.className = "node" + (node.id === ROOT_ID ? " root" : "") + (node.id === t.selectedId ? " selected" : "");
      el.style.left = node.x + "px";
      el.style.top = node.y + "px";
      el.style.background = c.fill;
      el.style.color = c.text;

      if (node.id === t.editingId) {
        const input = document.createElement("input");
        input.value = node.text;
        input.size = Math.max(6, node.text.length);
        input.addEventListener("input", (e) => {
          updateText(node.id, e.target.value);
          input.size = Math.max(6, e.target.value.length);
          markDirty();
        });
        input.addEventListener("blur", () => {
          t.editingId = null;
          renderBoard();
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === "Escape") {
            e.preventDefault();
            input.blur();
          }
        });
        el.appendChild(input);
        setTimeout(() => { input.focus(); input.select(); }, 0);
      } else {
        const span = document.createElement("span");
        span.textContent = node.text;
        el.appendChild(span);
      }

      // ノードのドラッグ移動(ポインターイベントでマウス/タッチ共通対応)
      el.addEventListener("pointerdown", (e) => {
        if (node.id === t.editingId) return; // 編集中は入力にフォーカスさせる
        e.stopPropagation();
        t.selectedId = node.id;
        t.colorMenuFor = null;
        nodeDrag = {
          id: node.id,
          pointerId: e.pointerId,
          startX: e.clientX,
          startY: e.clientY,
          origX: node.x,
          origY: node.y,
        };
        try { el.setPointerCapture(e.pointerId); } catch (err) {}
        renderBoard();
      });

      // どのノードにも表示される「－」ですぐ削除(選択中は常に表示、PCはホバーでも表示)
      if (node.id !== ROOT_ID) {
        const removeBtn = document.createElement("button");
        removeBtn.className = "node-remove";
        removeBtn.textContent = "－";
        removeBtn.title = "このノードを削除";
        removeBtn.addEventListener("pointerdown", (e) => e.stopPropagation());
        removeBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteNode(node.id);
        });
        el.appendChild(removeBtn);
      }

      if (node.id === t.selectedId && node.id !== t.editingId) {
        const actions = document.createElement("div");
        actions.className = "node-actions";

        const editMini = document.createElement("button");
        editMini.className = "mini-btn";
        editMini.textContent = "✎";
        editMini.title = "テキストを編集";
        editMini.addEventListener("pointerdown", (e) => e.stopPropagation());
        editMini.addEventListener("click", (e) => {
          e.stopPropagation();
          t.editingId = node.id;
          renderBoard();
        });

        const addMini = document.createElement("button");
        addMini.className = "mini-btn";
        addMini.textContent = "＋";
        addMini.title = "子ノードを追加";
        addMini.addEventListener("pointerdown", (e) => e.stopPropagation());
        addMini.addEventListener("click", (e) => {
          e.stopPropagation();
          addChild(node.id);
        });

        const colorMini = document.createElement("button");
        colorMini.className = "mini-btn";
        colorMini.textContent = "🎨";
        colorMini.title = "色を変える";
        colorMini.addEventListener("pointerdown", (e) => e.stopPropagation());
        colorMini.addEventListener("click", (e) => {
          e.stopPropagation();
          t.colorMenuFor = t.colorMenuFor === node.id ? null : node.id;
          renderBoard();
        });

        actions.appendChild(editMini);
        actions.appendChild(addMini);
        actions.appendChild(colorMini);
        el.appendChild(actions);
      }

      if (t.colorMenuFor === node.id) {
        const menu = document.createElement("div");
        menu.className = "color-menu";
        menu.addEventListener("pointerdown", (e) => e.stopPropagation());
        NODE_COLORS.forEach((col, idx) => {
          const dot = document.createElement("div");
          dot.className = "color-dot";
          dot.style.background = col.fill;
          dot.addEventListener("click", () => updateColor(node.id, idx));
          menu.appendChild(dot);
        });
        el.appendChild(menu);
      }

      nodesLayer.appendChild(el);
    });

    delBtn.disabled = t.selectedId === ROOT_ID;
  }

  function renderAll() {
    renderTabs();
    renderBoard();
  }

  // --- キャンバス: パン・ピンチズーム・ノードドラッグ(ポインターイベント統一) ---
  function dist(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
  }
  function mid(a, b) {
    return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
  }

  canvas.addEventListener("pointerdown", (e) => {
    const t = current();
    t.colorMenuFor = null;
    canvasPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    try { canvas.setPointerCapture(e.pointerId); } catch (err) {}

    if (canvasPointers.size === 1) {
      panState = { startX: e.clientX, startY: e.clientY, origX: t.pan.x, origY: t.pan.y };
      canvas.classList.add("panning");
    } else if (canvasPointers.size === 2) {
      const pts = Array.from(canvasPointers.values());
      pinchState = {
        initialDist: dist(pts[0], pts[1]),
        initialZoom: t.zoom,
        initialMid: mid(pts[0], pts[1]),
        initialPan: { x: t.pan.x, y: t.pan.y },
      };
      panState = null;
    }
    renderBoard();
  });

  window.addEventListener("pointermove", (e) => {
    const t = current();

    // ノードのドラッグ
    if (nodeDrag && nodeDrag.pointerId === e.pointerId) {
      const dx = (e.clientX - nodeDrag.startX) / t.zoom;
      const dy = (e.clientY - nodeDrag.startY) / t.zoom;
      t.nodes[nodeDrag.id].x = nodeDrag.origX + dx;
      t.nodes[nodeDrag.id].y = nodeDrag.origY + dy;
      renderBoard();
      return;
    }

    if (!canvasPointers.has(e.pointerId)) return;
    canvasPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (canvasPointers.size === 2 && pinchState) {
      const pts = Array.from(canvasPointers.values());
      const newDist = dist(pts[0], pts[1]);
      const newMid = mid(pts[0], pts[1]);
      const newZoom = Math.min(2.5, Math.max(0.3, pinchState.initialZoom * (newDist / pinchState.initialDist)));
      t.zoom = newZoom;
      t.pan.x = pinchState.initialPan.x + (newMid.x - pinchState.initialMid.x);
      t.pan.y = pinchState.initialPan.y + (newMid.y - pinchState.initialMid.y);
      renderBoard();
    } else if (canvasPointers.size === 1 && panState) {
      t.pan.x = panState.origX + (e.clientX - panState.startX);
      t.pan.y = panState.origY + (e.clientY - panState.startY);
      renderBoard();
    }
  });

  function endPointer(e) {
    if (nodeDrag && nodeDrag.pointerId === e.pointerId) {
      nodeDrag = null;
      markDirty();
    }
    if (canvasPointers.has(e.pointerId)) {
      canvasPointers.delete(e.pointerId);
      if (canvasPointers.size === 0) {
        canvas.classList.remove("panning");
        panState = null;
        pinchState = null;
        markDirty();
      } else if (canvasPointers.size === 1) {
        // ピンチから1本指パンへ戻す
        pinchState = null;
        const t = current();
        const [remaining] = Array.from(canvasPointers.values());
        panState = { startX: remaining.x, startY: remaining.y, origX: t.pan.x, origY: t.pan.y };
      }
    }
  }
  window.addEventListener("pointerup", endPointer);
  window.addEventListener("pointercancel", endPointer);

  // マウスホイールでもズーム(デスクトップ用)
  canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    const t = current();
    const delta = -e.deltaY * 0.001;
    t.zoom = Math.min(2.5, Math.max(0.3, t.zoom + delta));
    renderBoard();
    markDirty();
  }, { passive: false });

  // --- キーボード操作(物理キーボード接続時) ---
  window.addEventListener("keydown", (e) => {
    const t = current();
    if (t.editingId || editingTabId) return;
    if (!t.selectedId) return;
    if (e.key === "Tab") {
      e.preventDefault();
      addChild(t.selectedId);
    } else if (e.key === "Enter") {
      e.preventDefault();
      addSibling(t.selectedId);
    } else if ((e.key === "Delete" || e.key === "Backspace") && t.selectedId !== ROOT_ID) {
      e.preventDefault();
      deleteNode(t.selectedId);
    }
  });

  // --- ツールバーボタン ---
  addBtn.addEventListener("click", () => {
    const t = current();
    if (t.selectedId) addChild(t.selectedId);
  });
  delBtn.addEventListener("click", () => {
    const t = current();
    if (t.selectedId && t.selectedId !== ROOT_ID) deleteNode(t.selectedId);
  });
  exportBtn.addEventListener("click", exportCSV);
  saveBtn.addEventListener("click", doSave);

  window.addEventListener("beforeunload", (e) => {
    if (dirty) {
      e.preventDefault();
      e.returnValue = "";
    }
  });

  // --- 同期モーダル ---
  function updateSyncUI() {
    if (sbUserEmail) {
      syncStatusLine.textContent = `${sbUserEmail} に同期されています。他の端末でも同じメールアドレスでログインすると、このデータが読み込めます。`;
    } else if (supabaseConfigured && sbUserId) {
      syncStatusLine.textContent = "現在はこの端末だけに保存されています(匿名)。メールを登録すると他の端末でも同じデータを見られます。";
    } else {
      syncStatusLine.textContent = "この端末のブラウザだけに保存されています(オフラインモード)。";
    }
  }

  function openSyncModal() {
    syncMessage.textContent = "";
    syncMessage.className = "";
    if (sbUserEmail) syncEmailInput.value = sbUserEmail;
    updateSyncUI();
    syncModalBackdrop.classList.add("open");
  }
  function closeSyncModal() {
    syncModalBackdrop.classList.remove("open");
  }

  syncBtn.addEventListener("click", openSyncModal);
  syncModalClose.addEventListener("click", closeSyncModal);
  syncModalBackdrop.addEventListener("click", (e) => {
    if (e.target === syncModalBackdrop) closeSyncModal();
  });

  function setSyncMessage(text, kind) {
    syncMessage.textContent = text;
    syncMessage.className = kind || "";
  }

  linkEmailBtn.addEventListener("click", async () => {
    const email = syncEmailInput.value.trim();
    if (!sbClient) {
      setSyncMessage("Supabaseに接続できていません。", "error");
      return;
    }
    if (!email) {
      setSyncMessage("メールアドレスを入力してください。", "error");
      return;
    }
    linkEmailBtn.disabled = true;
    setSyncMessage("送信中…", "");
    try {
      const { error } = await sbClient.auth.updateUser(
        { email },
        { emailRedirectTo: window.location.href }
      );
      if (error) throw error;
      setSyncMessage("確認メールを送りました。届いたリンクを開いて確定してください。", "success");
    } catch (err) {
      console.error(err);
      setSyncMessage("送信に失敗しました: " + (err.message || err), "error");
    } finally {
      linkEmailBtn.disabled = false;
    }
  });

  loginEmailBtn.addEventListener("click", async () => {
    const email = syncEmailInput.value.trim();
    if (!sbClient) {
      setSyncMessage("Supabaseに接続できていません。", "error");
      return;
    }
    if (!email) {
      setSyncMessage("メールアドレスを入力してください。", "error");
      return;
    }
    loginEmailBtn.disabled = true;
    setSyncMessage("送信中…", "");
    try {
      const { error } = await sbClient.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.href },
      });
      if (error) throw error;
      setSyncMessage("ログイン用のリンクをメールに送りました。開くとこの端末に切り替わります。", "success");
    } catch (err) {
      console.error(err);
      setSyncMessage("送信に失敗しました: " + (err.message || err), "error");
    } finally {
      loginEmailBtn.disabled = false;
    }
  });

  // --- 初期化 ---
  function checkAuthErrorInUrl() {
    const hash = window.location.hash;
    if (!hash || hash.indexOf("error=") === -1) return;
    const params = new URLSearchParams(hash.slice(1));
    const desc = params.get("error_description");
    if (desc) {
      openSyncModal();
      setSyncMessage(
        "リンクの読み込みに失敗しました: " + decodeURIComponent(desc.replace(/\+/g, " ")) +
          "。もう一度メールを送り直してください。",
        "error"
      );
    }
    // URLを綺麗にしておく(次回リロード時に同じエラーが再表示されないように)
    history.replaceState(null, "", window.location.pathname + window.location.search);
  }

  (async function init() {
    checkAuthErrorInUrl();
    const connected = await initSupabase();
    saveStatus.textContent = connected
      ? "Supabaseに接続しました(複数端末で同期されます)"
      : (hasClaudeStorage ? "" : "オフラインモード(このブラウザのみに保存されます)");
    if (saveStatus.textContent) {
      saveStatus.style.opacity = "1";
      setTimeout(() => { if (!dirty) saveStatus.style.opacity = "0"; }, 3000);
    }
    await loadSaved();
    ready = true;
    renderAll();
    updateSyncUI();
  })();
})();
</script>
</body>
</html>
